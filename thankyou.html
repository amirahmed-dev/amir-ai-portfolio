<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Amir Ahmed</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* Specific layout styling for the thank you message */
        .thank-you-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .thank-you-container h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .thank-you-container p {
            font-size: 1.2rem;
            color: #a0a0a0;
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Amir<span>.AI</span></div>
        </nav>
    </header>

    <main>
        <section class="thank-you-container">
            <h1 class="reveal"><span class="highlight">Thank You!</span></h1>
            <p class="reveal delay-1">Thank you for reaching out! Your message has been received successfully. We'll be in contact soon.</p>
            <a href="index.html" class="btn primary-btn reveal delay-2">Back to Home</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Amir Ahmed. All rights reserved.</p>
    </footer>
    
    <script src="main.js"></script>
</body>
</html>
