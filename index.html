<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Architecture | Amir Ahmed</title>
  <style>
    /* =========================================
       SYNCHRONIZED DESIGN SYSTEM
       ========================================= */
    :root {
      --bg-main: #0a0a0c; --bg-secondary: #16161a; --text-main: #e2e8f0;
      --text-muted: #94a3b8; --neon-accent: #00f0ff; --neon-purple: #b026ff;
      --border-subtle: rgba(255, 255, 255, 0.05); --font-main: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-main); overflow-x: hidden; }
    
    .view-container { min-height: 100vh; padding: 100px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    
    .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; color: white; margin-bottom: 1.5rem; }
    .hero-title span { background: linear-gradient(to right, var(--neon-accent), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .btn-group { display: flex; gap: 16px; justify-content: center; margin-top: 2rem; align-items: center; min-height: 80px; }
    .primary-btn { display: inline-flex; align-items: center; gap: 12px; padding: 16px 32px; background: var(--text-main); color: var(--bg-main); border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: transform 0.2s; white-space: nowrap; }
    .primary-btn:hover { transform: scale(1.05); }
    .primary-btn svg { width: 20px; height: 20px; }

    #gallery-view { display: block; padding: 50px 0; }
    .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1200px; margin: 0 auto 100px auto; padding: 0 24px; }
    .macro-card img { width: 100%; border-radius: 12px; }
    
    .step-section { max-width: 1200px; margin: 0 auto 120px auto; padding: 0 24px; display: grid; grid-template-columns: 5fr 7fr; gap: 80px; align-items: center; }
    .step-title { font-size: 2.5rem; color: white; margin-bottom: 24px; }
    .ide-window { background: var(--bg-main); border: 1px solid #27272a; border-radius: 12px; overflow: hidden; }
    .ide-window img { width: 100%; display: block; }
    
    .download-section { text-align: center; padding: 80px 24px; border-top: 1px solid var(--border-subtle); }
    .secondary-link { display: inline-flex; align-items: center; gap: 8px; padding: 16px 32px; color: var(--text-muted); text-decoration: none; border: 1px solid var(--border-subtle); border-radius: 50px; transition: transform 0.5s ease; }
  </style>
</head>
<body>

  <section id="summary-view" class="view-container">
    <h1 class="hero-title">Enterprise Appointment <br> <span>Intelligence via n8n</span></h1>
    <p class="hero-desc">An automated, human-in-the-loop qualification system.</p>
    
    <div class="btn-group">
      <!-- FIXED: Back to index.html -->
      <a href="index.html" id="btn-portfolio" class="secondary-link">← Back to Portfolio</a>
      <button id="btn-view-architecture" class="primary-btn">
        <span>View Workflow Architecture</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </button>
    </div>
  </section>

  <section id="gallery-view">
    <div class="macro-grid">
      <div class="macro-card"><img src="photo_2026-07-04_22-21-02.jpg" alt="Path 1"></div>
      <div class="macro-card"><img src="photo_2026-07-04_22-21-03.jpg" alt="Path 2"></div>
    </div>

    <div class="step-section">
      <div><h3 class="step-title">Qualify Enquiries</h3><p>AI text classification screens requests.</p></div>
      <div class="ide-window"><img src="photo_2026-07-04_21-32-10.jpg"></div>
    </div>
    
    <div class="download-section">
      <h3 class="step-title">Deploy This Workflow</h3>
      <!-- FIXED: Clean filename referencing -->
      <a href="n8n-workflow.json" download="Amir-n8n-Booking-System.json" class="primary-btn">Download n8n JSON</a>
    </div>
  </section>

  <script>
    const btnView = document.getElementById('btn-view-architecture');
    const btnPortfolio = document.getElementById('btn-portfolio');
    const galleryView = document.getElementById('gallery-view');

    // Scroll trigger
    btnView.addEventListener('click', () => {
      galleryView.scrollIntoView({ behavior: 'smooth' });
    });

    // Cinematic button animation
    window.addEventListener('scroll', () => {
      let scrollY = window.scrollY;
      let progress = Math.min(scrollY / 300, 1);

      // Shrink & fade View button
      btnView.style.opacity = 1 - progress;
      btnView.style.transform = `scale(${1 - (progress * 0.5)})`;
      btnView.style.pointerEvents = progress >= 1 ? 'none' : 'auto';

      // Move Portfolio button to center
      btnPortfolio.style.transform = `scale(${1 + (progress * 0.3)}) translateX(${progress * 100}px)`;
    });
  </script>
</body>
</html>
